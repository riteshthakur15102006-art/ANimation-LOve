<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>❤️ Do You Love Me?</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<!-- Floating Hearts -->
<div id="heart-container"></div>

<!-- Main Card -->
<div id="mainCard">

    <video
        id="questionVideo"
        autoplay
        muted
        loop
        playsinline>

        <source src="Reply me love.mp4"
                type="video/mp4">

    </video>

    <h1>

        Do You Love Me? ❤️

    </h1>

    <p>

        There is only one correct answer 😏

    </p>

    <div id="buttonArea">

        <button
            id="yesBtn">

            ❤️ YES

        </button>

        <button
            id="noBtn">

            NO 😒

        </button>

    </div>

</div>

<!-- Loader -->

<div id="loader"
     class="hidden">

    <div class="heart-loader"></div>

    <h2>

        Loading Love...

    </h2>

</div>

<!-- Success Page -->

<div id="successPage"
     class="hidden">

    <video
        id="loveVideo"
        autoplay
        loop
        playsinline>

        <source src="Love me.mp4"
                type="video/mp4">

    </video>

    <h1>

        I Knew It 😍❤️

    </h1>

    <p>

        You made my day 💖

    </p>

</div>

<!-- Confetti -->

<canvas id="confettiCanvas"></canvas>

<script src="script.js"></script>

</body>

</html>
